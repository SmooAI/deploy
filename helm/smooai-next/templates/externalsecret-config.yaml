{{- if .Values.config.externalSecret.enabled -}}
# App config ExternalSecret. Syncs secret-tier config from the referenced
# ClusterSecretStore into a k8s Secret, which the Deployment `envFrom`'s into
# the container. The {envVar -> remote key} mapping is `config.externalSecret.data`.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.config.externalSecret.name }}
  labels:
    {{- include "smooai-next.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.config.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    kind: {{ .Values.config.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
    name: {{ .Values.config.externalSecret.secretStoreRef.name }}
  target:
    name: {{ .Values.config.externalSecret.name }}
    creationPolicy: Owner
  data:
    {{- range $envVar, $remoteKey := .Values.config.externalSecret.data }}
    - secretKey: {{ $envVar | quote }}
      remoteRef:
        key: {{ $remoteKey | quote }}
    {{- end }}
{{- end }}
