{{- if .Values.ghcr.externalSecret.enabled -}}
{{- $g := .Values.ghcr.externalSecret -}}
# Private-registry pull secret. Syncs a registry token from the ClusterSecretStore
# and renders a `kubernetes.io/dockerconfigjson` Secret (auth = b64(username:token))
# via a v2 template, so pods can pull the PRIVATE image. Referenced by
# imagePullSecrets on the pod spec.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $g.name }}
  labels:
    {{- include "smooai-next.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $g.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    kind: {{ $g.secretStoreRef.kind | default "ClusterSecretStore" }}
    name: {{ $g.secretStoreRef.name }}
  target:
    name: {{ $g.name }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        {{- /* ESO (engineVersion v2) interpolates `.token` at sync time. The
               doubled braces below are emitted LITERALLY by Helm so ESO — not
               Helm — resolves them. auth = base64(username:token). */}}
        .dockerconfigjson: '{"auths":{"{{ $g.registry }}":{"username":"{{ $g.username }}","password":"{{ printf "{{ .token }}" }}","auth":"{{ printf "{{ printf %q .token | b64enc }}" (printf "%s:%%s" $g.username) }}"}}}'
  data:
    - secretKey: token
      remoteRef:
        key: {{ $g.tokenRemoteKey | quote }}
{{- end }}
