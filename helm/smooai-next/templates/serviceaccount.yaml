{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "smooai-next.serviceAccountName" . }}
  labels:
    {{- include "smooai-next.labels" . | nindent 4 }}
  {{- if or .Values.irsaRoleArn .Values.serviceAccount.annotations }}
  annotations:
    {{- /* IRSA: the pod assumes this IAM role for S3 cacheHandler access. */}}
    {{- if .Values.irsaRoleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.irsaRoleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
